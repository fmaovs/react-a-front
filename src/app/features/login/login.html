<div class="login-container">
  <!-- Ambient background blobs -->
  <div class="background-accents">
    <div class="accent accent-1"></div>
    <div class="accent accent-2"></div>
    <div class="accent accent-3"></div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo-box">
        <lucide-icon [img]="ShieldIcon" class="icon-white"></lucide-icon>
      </div>
      <h1>BankVision</h1>
      <p class="subtitle">Sistema de Gestión de Cobranza</p>
    </div>

    <form (submit)="handleSubmit()" #loginForm="ngForm" class="login-form">
      <!-- Usuario -->
      <div class="form-group">
        <label class="field-label">Usuario</label>
        <div class="input-relative">
          <lucide-icon [img]="MailIcon" class="input-icon"></lucide-icon>
          <input
            type="text"
            name="email"
            required
            [(ngModel)]="email"
            placeholder="Nombre de usuario"
            class="form-input"
            autocomplete="username"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <div class="label-row">
          <label class="field-label">Contraseña</label>
          <button type="button" class="link-btn">¿Olvidó su clave?</button>
        </div>
        <div class="input-relative">
          <lucide-icon [img]="LockIcon" class="input-icon"></lucide-icon>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            required
            [(ngModel)]="password"
            placeholder="••••••••"
            class="form-input form-input-password"
          />
          <button
            type="button"
            class="eye-btn"
            (click)="showPassword.set(!showPassword())"
            [title]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <lucide-icon [img]="showPassword() ? EyeOffIcon : EyeIcon" class="eye-icon"></lucide-icon>
          </button>
        </div>
      </div>

      <!-- Error message -->
      @if (error()) {
        <div class="error-box">
          <lucide-icon [img]="AlertCircleIcon" class="error-icon"></lucide-icon>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="isLoading() || !loginForm.form.valid"
        class="submit-btn"
      >
        @if (isLoading()) {
          <div class="spinner"></div>
          <span>Verificando...</span>
        } @else {
          <span>Ingresar al Sistema</span>
          <lucide-icon [img]="ChevronRightIcon" class="btn-icon"></lucide-icon>
        }
      </button>
    </form>

    <div class="login-footer">
      <p>
        Acceso restringido a personal autorizado.<br />
        Protegido por políticas de seguridad BankVision.
      </p>
    </div>
  </div>
</div>
